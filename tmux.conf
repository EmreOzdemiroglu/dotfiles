set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-features ',*:RGB'
set -g allow-passthrough on

set -s escape-time 10

set -g mouse on

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g status-style 'bg=default,fg=#5eacd3'
set -g message-style 'bg=default,fg=#5eacd3'
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
set -g pane-border-style 'bg=default,fg=#3a3a3a'
set -g pane-active-border-style 'bg=default,fg=#5eacd3'
bind r source-file ~/.tmux.conf
set -g base-index 1
set -g detach-on-destroy off
set -g history-limit 1000000
set -g renumber-windows on

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'vaaleyard/tmux-dotbar'


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'



# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/notes/todo.md"

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww ~/scripts/tmux-sessionizer"

bind-key -r i run-shell "tmux neww ~/bin/tmux-cht"

#bind-key -r C run-shell "~/scripts/tmux-sessionizer ~/work/ayzeai"
#bind-key -r R run-shell "~/scripts/tmux-sessionizer ~/work/milo"
#bind-key -r L run-shell "~/scripts/tmux-sessionizer ~/work/hpack"
#bind-key -r H run-shell "~/scripts/tmux-sessionizer ~/personal/vim-with-me"
#bind-key -r T run-shell "~/scripts/tmux-sessionizer ~/personal/refactoring.nvim"
#bind-key -r N run-shell "~/scripts/tmux-sessionizer ~/personal/harpoon"
#bind-key -r S run-shell "~/scripts/tmux-sessionizer ~/personal/developer-productivity"
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# TPM shortcuts (lowercase keys help on Turkish keyboard layouts)
bind-key i run-shell '~/.tmux/plugins/tpm/bin/install_plugins'
bind-key u run-shell '~/.tmux/plugins/tpm/bin/update_plugins all'
bind-key M-u run-shell '~/.tmux/plugins/tpm/bin/clean_plugins'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
